<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <title>Post</title>
        <link rel="stylesheet" href="/css/style.css">
        <script>
            window.MathJax = {
            tex: {
                inlineMath: [['$', '$']],
                displayMath: [['$$', '$$']],
                processEscapes: true
            },
            options: {
                skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre', 'code'],
                enableMenu: false
            }
            };
        </script>
        <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
        <script src="/theme_load.js"></script>
        <style>
            .MJX_LiveRegion {
                background-color: transparent !important;
            }
            .MJX_HoverRegion{
                background-color: transparent !important;
            }
            .MJX_ToolTip{
                background-color: transparent !important;
            }
        </style>
    </head>
    <body>

    <div class="topbar">
        <a href="/blog">Back</a>
        <button id="theme-toggle">Toggle theme</button>
    </div>

    <input type="key" id="key" placeholder="Key">
    <button onclick="decrypt()">Unlock</button>

    <article id="content"></article>

    <script>
        async function decryptText(password, encoded) {
            const clean = encoded.replace(/\s+/g, "");
            const data = Uint8Array.from(atob(clean), c => c.charCodeAt(0));

            const salt = data.slice(0, 16);
            const iv = data.slice(16, 28);
            const ciphertext = data.slice(28);

            const enc = new TextEncoder();
            const dec = new TextDecoder();

            const keyMaterial = await crypto.subtle.importKey(
                "raw",
                enc.encode(password),
                "PBKDF2",
                false,
                ["deriveKey"]
            );

            const key = await crypto.subtle.deriveKey(
                {
                name: "PBKDF2",
                salt,
                iterations: 100000,
                hash: "SHA-256"
                },
                keyMaterial,
                { name: "AES-GCM", length: 256 },
                false,
                ["decrypt"]
            );

            const plaintext = await crypto.subtle.decrypt(
                { name: "AES-GCM", iv },
                key,
                ciphertext
            );

            return dec.decode(plaintext);
        }

        async function decrypt() {
            const pw = document.getElementById("key").value;

            const res = await fetch("content.enc");
            const data = await res.text();

            const html = await decryptText(pw, data);
            document.getElementById("content").innerHTML = html;

            if (window.MathJax) {
                MathJax.typesetPromise([document.getElementById("content")]);
            }
        }
    </script>
    <script src="/theme.js"></script>

    </body>
</html>
