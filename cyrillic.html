		<h1>Welsh Cyrillic Translator</h1>
		<p>A tool for converting the latin Welsh alphabet into Cyrillic and vice versa. Idea and reference <a href="https://www.omniglot.com/conscripts/welshcyrillic.htm">here</a>.</p>
		<textarea oninput="latinChanged();" id="latin" name="story" rows="33" cols="55">Genir pawb yn rhydd ac yn gydradd â'i gilydd mewn urddas a hawliau. Fe'u cynysgaeddir â rheswm a chydwybod, a dylai pawb ymddwyn y naill at y llall mewn ysbryd cymodlon. </textarea>

		<textarea oninput="cyrillicChanged();" id="cyrillic" name="story" rows="33" cols="55">Ѓенир пауб ън ҏъђ ак ън ѓъдрађ а̄'и ѓилъђ меун ырђас а гаулиаы. Ве'ы кънъсѓаеђир ā ҏесум а хъдуъбод, а дълаи пауб ъмђуън ъ наиљ ат ъ љаљ меун ъсбръд къмодлон. </textarea>
